<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Проект</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #4a90e2; margin-bottom: 10px; }
        p { font-size: 1.1em; color: #666; }
        .status {
            display: inline-block;
            padding: 5px 15px;
            background: #2ecc71;
            color: white;
            border-radius: 50px;
            font-size: 0.8em;
            margin-top: 15px;
        }
        .btn {
            display: block;
            margin-top: 25px;
            padding: 10px 20px;
            background: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover { background: #357abd; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello World!</h1>
        <p>Эта страница была автоматически развернута с помощью <b>Jenkins</b> и <b>Ansible</b>.</p>
        <div class="status">Деплой успешен ✅</div>
        <a href="#" class="btn">Узнать больше</a>
    </div>
</body>
</html>
